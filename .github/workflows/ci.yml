name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check . --output-format=github
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: tello-core
            test-path: packages/tello-core/tests/
            cov-source: packages/tello-core/src
          - package: tello-mcp
            test-path: services/tello-mcp/tests/
            cov-source: services/tello-mcp/src
          - package: tello-telemetry
            test-path: services/tello-telemetry/tests/
            cov-source: services/tello-telemetry/src
          - package: tello-navigator
            test-path: services/tello-navigator/tests/
            cov-source: services/tello-navigator/src
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --package ${{ matrix.package }} pytest ${{ matrix.test-path }} --cov=${{ matrix.cov-source }} --tb=short

  type-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ty check packages/ services/
